version: 0.2

eb_codebuild_settings:
  CodeBuildServiceRole: AWSServiceRoleForElasticBeanstalk
  ComputeType: BUILD_GENERAL1_SMALL
  Image: aws/codebuild/amazonlinux2-x86_64-standard:3.0
  Timeout: 60

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing Python dependencies..."
      - pip install -r backend/requirements.txt
  build:
    commands:
      - echo "Build phase complete - backend will be served by Elastic Beanstalk"

artifacts:
  files:
    - '**/*'
  name: BackendBuild

cache:
  paths:
    - '/root/.cache/pip/**/*'
