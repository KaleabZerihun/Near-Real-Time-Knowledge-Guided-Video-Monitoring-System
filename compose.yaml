services:

  # ── React frontend served by nginx ─────────────────────────────────────────
  # The backend runs LOCALLY outside Docker (so it can access your webcam).
  # nginx proxies all /api, /status, /pipeline, /video, /frame-selector
  # calls through to http://host.docker.internal:8000 (your local backend).
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "5173:80"
    restart: unless-stopped
    extra_hosts:
      # Allows the container to reach your local machine's backend
      - "host.docker.internal:host-gateway"

# No volumes needed — backend handles its own data locally