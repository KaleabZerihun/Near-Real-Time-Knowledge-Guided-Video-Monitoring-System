server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy all backend calls to your LOCAL backend running on port 8000 ──
    # host.docker.internal resolves to your host machine from inside Docker
    location ~ ^/(status|pipeline|video|frame-selector|api|images)(/|$) {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        # Essential for video stream and SSE (server-sent events)
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # ── SPA fallback — React Router handles all other routes ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}